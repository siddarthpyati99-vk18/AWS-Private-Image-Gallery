<!DOCTYPE html>
<html>
<head>
<title>Private Image Gallery</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#232f3e;
    color:white;
    text-align:center;
    padding:20px;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

.gallery img{
    width:300px;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

footer{
    background:#232f3e;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

</style>

</head>

<body>

<header>

<h1>AWS Private Image Gallery</h1>

<p>Images stored securely in Amazon S3</p>

</header>

<div class="gallery">

<img src="images/image1.jpg">
<img src="images/image2.jpg">
<img src="images/image3.jpg">
<img src="images/image4.jpg">

</div>

<footer>

Built using AWS S3 • EC2 • IAM • Apache

</footer>

</body>
</html>
